<!DOCTYPE html>
<html lang="vi">
      <head>
     <title>Form</title>
     <meta charset="utf-8">
     <link rel = "stylesheet" href = "../css/style2.css">
      </head>
      <body>
       <div class="container">
           <form id="frmLogin">
            <h3>Đăng nhập hệ thống</h3>
            <div class="form-group">
              <label for="txtUsername">Tên đăng nhập</label>
              <input class="form-control" type="text" id="txtUsername" name ="textUsername" placeholder="Tên đăng nhập">
            </div>
           <div class="form-group">
              <label for="txtPassword">Mật khẩu</label>
              <input class="form-control" type="text" id="txtPassword" name ="textPassword" placeholder="Mật khẩu">
            </div>
             <input type ="submit" type="text" id="txtPassword" name ="textPassword" placeholder="Mật khẩu">
             <input type ="reset" type="text" id="txtPassword" name ="textPassword" placeholder="Mật khẩu">
            </form>
            
        </div>

      </body>	 
</html>
