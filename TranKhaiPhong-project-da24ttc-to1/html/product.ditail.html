<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Hải Sản Nâng Cao</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f5f5;
    padding:20px;
    transition:0.3s;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#0d6efd;
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:20px;
}

input, select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

#dark-btn{
    background:black;
    color:white;
}

#product-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.product-card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.product-card:hover{
    transform:translateY(-5px);
}

.product-card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.product-info{
    padding:15px;
}

.product-info h3{
    margin-bottom:10px;
}

.price{
    color:red;
    font-weight:bold;
    margin-bottom:10px;
}

.rating{
    color:orange;
    margin-bottom:10px;
}

.add-btn{
    width:100%;
    background:#0d6efd;
    color:white;
    font-size:16px;
}

.add-btn:hover{
    background:#084298;
}

.cart{
    position:fixed;
    top:20px;
    right:20px;
    width:300px;
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
    max-height:90vh;
    overflow:auto;
}

.cart h2{
    margin-bottom:15px;
}

.cart-item{
    border-bottom:1px solid #ddd;
    padding-bottom:10px;
    margin-bottom:10px;
}

.remove-btn{
    background:red;
    color:white;
    margin-top:5px;
}

.total{
    font-weight:bold;
    color:red;
    margin-top:10px;
    margin-bottom:10px;
}

.checkout-btn{
    width:100%;
    background:green;
    color:white;
}

.dark{
    background:#1e1e1e;
    color:white;
}

.dark .product-card,
.dark .cart{
    background:#2c2c2c;
    color:white;
}

.dark input,
.dark select{
    background:#333;
    color:white;
    border:1px solid #666;
}

</style>
</head>

<body>

<h1>🦞 SHOP HẢI SẢN</h1>

<div class="controls">

    <input type="text" id="search" placeholder="Tìm sản phẩm...">

    <select id="sort">
        <option value="">Sắp xếp</option>
        <option value="low-high">Giá tăng dần</option>
        <option value="high-low">Giá giảm dần</option>
    </select>

    <select id="filter-rating">
        <option value="">Lọc số sao</option>
        <option value="5">5 Sao</option>
        <option value="4">4 Sao trở lên</option>
    </select>

    <select id="filter-price">
        <option value="">Lọc giá</option>
        <option value="low">Dưới 300K</option>
        <option value="mid">300K - 600K</option>
        <option value="high">Trên 600K</option>
    </select>

    <button id="dark-btn">
        🌙 Dark Mode
    </button>

</div>

<div id="product-list"></div>

<div class="cart">

    <h2>
        🛒 Giỏ hàng
        (<span id="cart-count">0</span>)
    </h2>

    <div id="cart-items"></div>

    <div class="total">
        Tổng tiền:
        <span id="total-price">0</span> VNĐ
    </div>

    <button class="checkout-btn" onclick="checkout()">
        Thanh toán
    </button>

</div>

<script>

const seafoodProducts = [

    {
        id:1,
        name:"Tôm Hùm Alaska",
        price:850000,
        img:"assets/images/tomhum.jpg",
        rating:5
    },

    {
        id:2,
        name:"Cua Cà Mau",
        price:450000,
        img:"assets/images/cuacamau.jpg",
        rating:4
    },

    {
        id:3,
        name:"Mực Lá Đại Dương",
        price:320000,
        img:"assets/images/mucla.jpg",
        rating:4
    },

    {
        id:4,
        name:"Bào Ngư Hàn Quốc",
        price:900000,
        img:"assets/images/baongu.jpg",
        rating:5
    },

    {
        id:5,
        name:"Cá Hồi Na Uy",
        price:380000,
        img:"assets/images/cahoi.jpg",
        rating:5
    },

    {
        id:6,
        name:"Ốc Hương",
        price:280000,
        img:"assets/images/ochuong.jpg",
        rating:5
    },

    {
        id:7,
        name:"Ghẹ Xanh",
        price:400000,
        img:"assets/images/ghexanh.jpg",
        rating:4
    },

    {
        id:8,
        name:"Hàu Sữa Pháp",
        price:120000,
        img:"assets/images/hausua.jpg",
        rating:4
    },

    {
        id:9,
        name:"Sò Dương Phú Quốc",
        price:150000,
        img:"assets/images/soduong.jpg",
        rating:4
    },

    {
        id:10,
        name:"Cá Mú Đỏ",
        price:600000,
        img:"assets/images/camudo.jpg",
        rating:5
    }

];

const productList = document.getElementById("product-list");
const searchInput = document.getElementById("search");
const sortSelect = document.getElementById("sort");
const ratingFilter = document.getElementById("filter-rating");
const priceFilter = document.getElementById("filter-price");

const cartItems = document.getElementById("cart-items");
const totalPrice = document.getElementById("total-price");
const cartCount = document.getElementById("cart-count");

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function displayProducts(products){

    productList.innerHTML = "";

    products.forEach(product => {

        let stars = "⭐".repeat(product.rating);

        productList.innerHTML += `
        
        <div class="product-card">

            <img src="${product.img}" alt="${product.name}">

            <div class="product-info">

                <h3>${product.name}</h3>

                <div class="price">
                    ${product.price.toLocaleString()} VNĐ
                </div>

                <div class="rating">
                    ${stars}
                </div>

                <button class="add-btn"
                onclick="addToCart(${product.id})">

                    Thêm vào giỏ

                </button>

            </div>

        </div>
        
        `;

    });

}

displayProducts(seafoodProducts);

function filterProducts(){

    let filtered = [...seafoodProducts];

    const keyword = searchInput.value.toLowerCase();

    filtered = filtered.filter(product =>
        product.name.toLowerCase().includes(keyword)
    );

    if(ratingFilter.value){

        filtered = filtered.filter(product =>
            product.rating >= Number(ratingFilter.value)
        );

    }

    if(priceFilter.value === "low"){

        filtered = filtered.filter(product =>
            product.price < 300000
        );

    }

    if(priceFilter.value === "mid"){

        filtered = filtered.filter(product =>
            product.price >= 300000 &&
            product.price <= 600000
        );

    }

    if(priceFilter.value === "high"){

        filtered = filtered.filter(product =>
            product.price > 600000
        );

    }

    if(sortSelect.value === "low-high"){

        filtered.sort((a,b) => a.price - b.price);

    }

    if(sortSelect.value === "high-low"){

        filtered.sort((a,b) => b.price - a.price);

    }

    displayProducts(filtered);

}

searchInput.addEventListener("input", filterProducts);
sortSelect.addEventListener("change", filterProducts);
ratingFilter.addEventListener("change", filterProducts);
priceFilter.addEventListener("change", filterProducts);

function addToCart(id){

    const existing = cart.find(item => item.id === id);

    if(existing){

        existing.quantity += 1;

    }else{

        const product = seafoodProducts.find(item => item.id === id);

        cart.push({
            ...product,
            quantity:1
        });

    }

    alert("Đã thêm vào giỏ hàng!");

    renderCart();

}

function renderCart(){

    cartItems.innerHTML = "";

    let total = 0;

    cart.forEach((item,index) => {

        total += item.price * item.quantity;

        cartItems.innerHTML += `
        
        <div class="cart-item">

            <h4>${item.name}</h4>

            <p>
                ${item.price.toLocaleString()} VNĐ
            </p>

            <p>
                Số lượng: ${item.quantity}
            </p>

            <button onclick="increaseQty(${index})">
                +
            </button>

            <button onclick="decreaseQty(${index})">
                -
            </button>

            <button class="remove-btn"
            onclick="removeCart(${index})">

                Xóa

            </button>

        </div>
        
        `;

    });

    totalPrice.innerText = total.toLocaleString();

    cartCount.innerText = cart.length;

    localStorage.setItem("cart", JSON.stringify(cart));

}

renderCart();

function removeCart(index){

    cart.splice(index,1);

    renderCart();

}

function increaseQty(index){

    cart[index].quantity++;

    renderCart();

}

function decreaseQty(index){

    if(cart[index].quantity > 1){

        cart[index].quantity--;

    }else{

        cart.splice(index,1);

    }

    renderCart();

}

function checkout(){

    if(cart.length === 0){

        alert("Giỏ hàng đang trống!");

        return;

    }

    alert("Thanh toán thành công!");

    cart = [];

    renderCart();

}

const darkBtn = document.getElementById("dark-btn");

darkBtn.addEventListener("click", () => {

    document.body.classList.toggle("dark");

});

</script>

</body>
</html>
